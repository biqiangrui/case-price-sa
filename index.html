<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>沙特手机壳价格搜索</title>
    <link rel="stylesheet" href="styles.css?v=20260605-images">
  </head>
  <body>
    <main class="app home" id="app">
      <section class="search-stage">
        <div class="search-intro">
          <p>沙特市场价格数据</p>
          <h1>沙特手机壳价格搜索</h1>
        </div>

        <form class="search-box" id="searchForm">
          <input id="searchInput" type="search" placeholder="搜索 iPhone 17 Pro Max 手机壳价格" autocomplete="off">
          <label class="image-button" title="图片搜索">
            <input id="imageInput" type="file" accept="image/*">
            <span>图片</span>
          </label>
          <button type="submit">搜索</button>
        </form>

        <div class="quick-searches" id="quickSearches"></div>
      </section>

      <section class="platforms" id="platforms">
        <div class="platforms-head">
          <h1>沙特主流购物平台</h1>
          <p>查看客户熟悉的网站价格，快速对比同款手机壳行情。</p>
        </div>
        <div id="platformGrid" class="platform-grid"></div>
      </section>

      <section class="results" id="results" aria-live="polite">
        <div class="results-head">
          <div>
            <h1 id="resultTitle">搜索结果</h1>
            <p id="resultMeta"></p>
          </div>
          <span class="source-link">我们的报价</span>
        </div>

        <div class="price-insights" id="priceInsights"></div>
        <div class="data-trust" id="dataTrust"></div>
        <div class="match-compare" id="matchCompare"></div>

        <div class="result-tools">
          <div class="filter-tabs" id="filterTabs" aria-label="平台筛选"></div>
          <label class="sort-control">
            <span>排序</span>
            <select id="sortSelect">
              <option value="recommended">推荐</option>
              <option value="price-low">价格从低到高</option>
              <option value="price-high">价格从高到低</option>
              <option value="newest">最新数据</option>
            </select>
          </label>
        </div>

        <div id="siteResults" class="site-results"></div>
      </section>
    </main>

    <script src="supabase-config.js?v=20260604-supabase"></script>
    <script src="app.js?v=20260605-real-images"></script>
  </body>
</html>
